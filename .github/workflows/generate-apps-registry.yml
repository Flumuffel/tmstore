name: Generate Apps Registry

on:
  push:
    branches: [ "main" ]
    paths:
      - "tools/tampermonkey/apps/**/*.app.js"
      - "tools/tampermonkey/build_registry.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate apps.json from app headers
        run: |
          python tools/tampermonkey/build_registry.py \
            --repo-owner Flumuffel \
            --repo-name tmstore \
            --ref main \
            --apps-dir tools/tampermonkey/apps \
            --output api/tm-store/apps.json

      - name: Commit updated registry
        run: |
          if git diff --quiet -- api/tm-store/apps.json; then
            echo "No registry changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/tm-store/apps.json
          git commit -m "chore: regenerate apps registry"
          git push
